site_name: Agent Memory Server
site_description: Session Memory and Long-Term Memory for AI Agents.
site_url: https://ai.redis.io/agent-memory/
repo_url: https://github.com/redis/agent-memory-server
repo_name: redis/agent-memory-server
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Redis Inc.

docs_dir: docs

exclude_docs: |
  _build/
  _static/
  _templates/
  conf.py
  Makefile
  requirements.txt

theme:
  name: material
  language: en
  logo: assets/redis-logo-script.svg
  favicon: assets/favicon.png
  font:
    text: Space Grotesk
    code: Space Mono
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/redis/agent-memory-server
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agent-memory-server/

extra_css:
  - stylesheets/redis-brand.css
  - stylesheets/extra.css

plugins:
  - search
  - autorefs
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            docstring_section_style: table
            inherited_members: true
            filters:
              - "!^_"
  - mkdocs-jupyter:
      execute: false
      include_source: true
      theme: light
      ignore_h1_titles: false
      remove_tag_config:
        remove_input_tags:
          - hide_input
        remove_all_outputs_tags:
          - hide_output
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Concepts:
          - concepts/*.md
        User Guide:
          - user_guide/*.md
          - user_guide/how_to_guides/*.md
        Examples:
          - examples/*.md
        API Reference:
          - api/*.md
        For AI Agents:
          - for-ais-only/*.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

watch:
  - agent_memory_server
  - AGENTS.md


nav:
  - Home: index.md
  - Concepts:
      - concepts/index.md
      - Working memory: concepts/working_memory.md
      - Long-term memory: concepts/long_term_memory.md
      - Memory lifecycle: concepts/memory_lifecycle.md
      - Memory extraction: concepts/memory_extraction.md
      - Contextual grounding: concepts/contextual_grounding.md
      - Recency boost: concepts/recency_boost.md
      - Summary views: concepts/summary_views.md
  - User Guide:
      - user_guide/index.md
      - Quick start: user_guide/01_quick_start.md
      - Getting started: user_guide/02_installation.md
      - macOS (no Docker): user_guide/03_no_docker_setup.md
      - How-To Guides:
          - user_guide/how_to_guides/index.md
          - Authentication: user_guide/how_to_guides/authentication.md
          - Configuration: user_guide/how_to_guides/configuration.md
          - LLM providers: user_guide/how_to_guides/llm_providers.md
          - Embedding providers: user_guide/how_to_guides/embedding_providers.md
          - AWS Bedrock: user_guide/how_to_guides/aws_bedrock.md
          - Advanced vector DB: user_guide/how_to_guides/advanced_vector_db.md
          - Custom vector DB: user_guide/how_to_guides/custom_vector_db.md
          - Query optimization: user_guide/how_to_guides/query_optimization.md
          - Memory editing: user_guide/how_to_guides/memory_editing.md
          - Integration patterns: user_guide/how_to_guides/integration_patterns.md
          - Development: user_guide/how_to_guides/development.md
          - Custom prompt security: user_guide/how_to_guides/security.md
  - Examples:
      - examples/index.md
      - Use cases: examples/use_cases.md
      - Agent examples:
          - examples/agent_examples.md
          - Interactive guide: examples/agent_memory_server_interactive_guide.ipynb
          - Travel agent: examples/travel_agent.md
          - Memory prompt agent: examples/memory_prompt_agent.md
          - Memory editing agent: examples/memory_editing_agent.md
          - AI tutor: examples/ai_tutor.md
          - Recent messages limit demo: examples/recent_messages_limit_demo.md
      - LangChain: examples/langchain.md
  - API Reference:
      - api/index.md
      - REST API: api/rest.md
      - MCP server: api/mcp.md
      - CLI: api/cli.md
      - Python SDK: api/python_sdk.md
      - TypeScript SDK: api/typescript_sdk.md
      - Java SDK: api/java_sdk.md
      - Server package:
          - api/server/index.md
          - Models: api/server/models.md
          - Working memory: api/server/working_memory.md
          - Long-term memory: api/server/long_term_memory.md
          - Memory strategies: api/server/memory_strategies.md
          - Vector DB: api/server/memory_vector_db.md
          - Extraction: api/server/extraction.md
          - Summarization: api/server/summarization.md
          - Filters: api/server/filters.md
          - Auth: api/server/auth.md
          - Config: api/server/config.md
          - LLM client: api/server/llm.md
  - For AI Agents:
      - for-ais-only/index.md
      - Repository map: for-ais-only/REPOSITORY_MAP.md
      - Build and test: for-ais-only/BUILD_AND_TEST.md
      - Failure modes: for-ais-only/FAILURE_MODES.md
      - Authoring standard: for-ais-only/AUTHORING_STANDARD.md
  - Changelog: https://github.com/redis/agent-memory-server/releases
